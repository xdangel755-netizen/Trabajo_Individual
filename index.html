<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumno</title>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fuentes de Google Fonts-->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="style.css">

    <!-- Link Favicon -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Link de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Libreria JQuery-->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

</head>

<body>

    <article class="container">
        <form id="formRegistro" class="formulario">
            <header>
                <h1 class="titulo">Portal de Inscripción</h1>
                <p class="subtitulo">Completa los datos para el nuevo registro escolar</p>
            </header>

            <!-- Sección de Datos del Alumno -->
            <div class="form-section">
                <span class="section-label"><i class="fa-solid fa-user-graduate"></i> Datos del Alumno</span>

                <div class="input-group">
                    <label for="regNombres">Nombres completas</label>
                    <input type="text" id="regNombres" name="nombres" placeholder="Ingresa los nombres" required>
                </div>

                <div class="input-group">
                    <label for="regApellidos">Apellidos completos</label>
                    <input type="text" id="regApellidos" name="apellidos" placeholder="Ingresa los apellidos" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label for="regDni">N° DNI</label>
                        <input type="text" id="regDni" name="dni" placeholder="8 dígitos" maxlength="8"
                            pattern="[0-9]{8}" title="Escriba un DNI válido de 8 dígitos" required>
                    </div>
                    <div class="input-group">
                        <label for="regNacimiento">F. Nacimiento</label>
                        <input type="date" id="regNacimiento" name="nacimiento" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="regCorreo">Correo Electrónico</label>
                    <input type="email" id="regCorreo" name="correo" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <!-- Sección de Datos del Apoderado -->
            <div class="form-section">
                <span class="section-label"><i class="fa-solid fa-user-shield"></i> Datos del Apoderado</span>

                <div class="input-group">
                    <label for="apoNombres">Nombre del responsable</label>
                    <input type="text" id="apoNombres" name="apoNombres" placeholder="Nombre completo" required>
                </div>

                <div class="input-group">
                    <label for="apoCelular">Celular de contacto</label>
                    <input type="text" id="apoCelular" name="apoCelular" placeholder="9 dígitos" maxlength="9"
                        pattern="[0-9]{9}" title="Escriba un número de 9 dígitos" required>
                </div>
            </div>

            <button class="btn-primary" type="submit">
                <i class="fa-solid fa-paper-plane"></i> Finalizar Registro
            </button>

            <p id="mensajeRegistro" class="mensaje"></p>

            <button id="btnAlternarVista" type="button">¿Ya tienes una cuenta? Iniciar Sesión</button>
        </form>

        <!-- Formulario de Login (Inicialmente oculto) -->
        <form id="formLogin" class="formulario" style="display:none;">
            <header>
                <h2 class="titulo">Bienvenido de nuevo</h2>
                <p class="subtitulo">Ingresa tus credenciales para acceder</p>
            </header>

            <div class="form-section">
                <div class="input-group">
                    <label for="logUsuario">DNI o Usuario</label>
                    <input type="text" id="logUsuario" placeholder="Ingrese su documento" required>
                </div>

                <div class="input-group">
                    <label for="logPassword">Contraseña</label>
                    <input type="password" id="logPassword" placeholder="••••••••" required>
                </div>
            </div>

            <button class="btn-primary" type="submit">
                <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
            </button>

            <p id="mensajeLogin" class="mensaje"></p>

            <button id="btnVolverRegistro" type="button" class="btn-link"
                style="background: none; border: none; color: var(--primary-color); cursor: pointer; margin-top: 20px; width: 100%;">
                ¿No tienes cuenta? Registrarse
            </button>
        </form>
    </article>

    <script src="js/app.js"></script>
</body>


</html>
